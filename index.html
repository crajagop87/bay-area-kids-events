<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bay Area Kids Events</title>
<style>
  /* ── Typography & reset ── */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --ink:       #1a1a1a;
    --ink-2:     #555;
    --ink-3:     #888;
    --rule:      #e0ddd8;
    --bg:        #faf9f7;
    --bg-card:   #ffffff;
    --free:      #2d6a4f;
    --paid:      #6b4226;
    --accent:    #b5451b;
    --font:      'Georgia', 'Times New Roman', serif;
    --mono:      'SF Mono', 'Fira Mono', 'Consolas', monospace;
    --sans:      -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  }

  body {
    background: var(--bg);
    color: var(--ink);
    font-family: var(--font);
    font-size: 15px;
    line-height: 1.6;
    min-height: 100vh;
  }

  /* ── Header ── */
  header {
    border-bottom: 1px solid var(--ink);
    padding: 2rem 0 1rem;
    margin-bottom: 2rem;
  }
  .header-inner {
    max-width: 960px;
    margin: 0 auto;
    padding: 0 1.5rem;
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 0.5rem;
  }
  h1 {
    font-size: 1.25rem;
    font-weight: normal;
    letter-spacing: 0.02em;
  }
  h1 em { font-style: normal; color: var(--accent); }
  #meta {
    font-family: var(--sans);
    font-size: 0.72rem;
    color: var(--ink-3);
    letter-spacing: 0.03em;
  }

  /* ── Controls ── */
  .controls {
    max-width: 960px;
    margin: 0 auto 1.5rem;
    padding: 0 1.5rem;
    display: flex;
    flex-wrap: wrap;
    gap: 0.6rem;
    align-items: center;
  }

  .filter-group {
    display: flex;
    align-items: center;
    gap: 0.35rem;
  }
  .filter-label {
    font-family: var(--sans);
    font-size: 0.7rem;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--ink-3);
  }

  select, input[type="date"] {
    font-family: var(--sans);
    font-size: 0.8rem;
    color: var(--ink);
    background: transparent;
    border: none;
    border-bottom: 1px solid var(--ink-2);
    padding: 0.15rem 0.3rem;
    cursor: pointer;
    appearance: none;
    -webkit-appearance: none;
    outline: none;
  }
  select:focus, input[type="date"]:focus {
    border-bottom-color: var(--accent);
  }

  .pill-group {
    display: flex;
    gap: 0.3rem;
    flex-wrap: wrap;
  }
  .pill {
    font-family: var(--sans);
    font-size: 0.72rem;
    padding: 0.2rem 0.65rem;
    border-radius: 99px;
    border: 1px solid var(--rule);
    background: transparent;
    color: var(--ink-2);
    cursor: pointer;
    transition: all 0.1s;
    white-space: nowrap;
  }
  .pill:hover { border-color: var(--ink-2); color: var(--ink); }
  .pill.active { background: var(--ink); color: #fff; border-color: var(--ink); }

  .search-wrap {
    flex: 1;
    min-width: 160px;
  }
  #search {
    font-family: var(--sans);
    font-size: 0.82rem;
    border: none;
    border-bottom: 1px solid var(--rule);
    background: transparent;
    padding: 0.2rem 0.3rem;
    width: 100%;
    outline: none;
    color: var(--ink);
  }
  #search:focus { border-bottom-color: var(--accent); }
  #search::placeholder { color: var(--ink-3); }

  .count-line {
    max-width: 960px;
    margin: 0 auto 1rem;
    padding: 0 1.5rem;
    font-family: var(--sans);
    font-size: 0.72rem;
    color: var(--ink-3);
    letter-spacing: 0.03em;
  }
  .count-line strong { color: var(--ink); }

  /* ── Divider / date group headers ── */
  .date-group {
    max-width: 960px;
    margin: 1.5rem auto 0.5rem;
    padding: 0 1.5rem;
  }
  .date-group h2 {
    font-family: var(--sans);
    font-size: 0.7rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--ink-3);
    border-top: 1px solid var(--rule);
    padding-top: 0.5rem;
  }

  /* ── Event grid ── */
  .grid {
    max-width: 960px;
    margin: 0 auto;
    padding: 0 1.5rem 4rem;
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 1px;
    background: var(--rule);
  }

  /* ── Event card ── */
  .card {
    background: var(--bg-card);
    padding: 1rem 1.1rem 0.9rem;
    display: flex;
    flex-direction: column;
    gap: 0.3rem;
    transition: background 0.1s;
  }
  .card:hover { background: #f5f3ef; }

  .card-title {
    font-size: 0.92rem;
    font-weight: normal;
    line-height: 1.35;
    color: var(--ink);
  }
  .card-title a {
    color: var(--accent);
    text-decoration: none;
    border-bottom: 1px solid color-mix(in srgb, var(--accent) 30%, transparent);
  }
  .card-title a:hover {
    border-bottom-color: var(--accent);
  }
  .card-link {
    font-family: var(--sans);
    font-size: 0.72rem;
    color: var(--ink-3);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .card-link a {
    color: var(--ink-3);
    text-decoration: underline;
    text-underline-offset: 2px;
  }
  .card-link a:hover { color: var(--accent); }

  .card-meta {
    font-family: var(--sans);
    font-size: 0.72rem;
    color: var(--ink-2);
    display: flex;
    flex-wrap: wrap;
    gap: 0.2rem 0.6rem;
    align-items: baseline;
    margin-top: 0.1rem;
  }

  .tag {
    font-family: var(--sans);
    font-size: 0.65rem;
    font-weight: 600;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    padding: 0.1rem 0.4rem;
    border-radius: 3px;
  }
  .tag-free  { background: #d8f3e3; color: var(--free); }
  .tag-paid  { background: #f7e8d8; color: var(--paid); }
  .tag-unknown { background: var(--rule); color: var(--ink-3); }
  .tag-camp  { background: #e8e0f7; color: #4a2d8a; }

  .card-venue {
    font-family: var(--sans);
    font-size: 0.72rem;
    color: var(--ink-3);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .card-source {
    margin-top: auto;
    font-family: var(--sans);
    font-size: 0.65rem;
    color: var(--ink-3);
    padding-top: 0.4rem;
    border-top: 1px solid var(--rule);
  }

  /* ── Empty state ── */
  #empty {
    max-width: 960px;
    margin: 4rem auto;
    padding: 0 1.5rem;
    text-align: center;
    font-family: var(--sans);
    color: var(--ink-3);
    font-size: 0.85rem;
    display: none;
  }

  /* ── Loading ── */
  #loading {
    max-width: 960px;
    margin: 4rem auto;
    padding: 0 1.5rem;
    font-family: var(--sans);
    font-size: 0.8rem;
    color: var(--ink-3);
    text-align: center;
  }

  /* ── Tufte sparkline-style cost bar ── */
  .cost-bar {
    display: inline-block;
    width: 3px;
    height: 10px;
    border-radius: 1px;
    margin-right: 2px;
    vertical-align: middle;
    background: var(--free);
  }
  .cost-bar.paid { background: var(--paid); }

  /* ── Footer note ── */
  footer {
    position: fixed;
    bottom: 0;
    left: 0; right: 0;
    background: var(--bg);
    border-top: 1px solid var(--rule);
    padding: 0.5rem 1.5rem;
    font-family: var(--sans);
    font-size: 0.68rem;
    color: var(--ink-3);
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 1rem;
  }
  footer a { color: var(--ink-3); text-decoration: underline; }

  @media (max-width: 600px) {
    .grid { grid-template-columns: 1fr; }
    .header-inner { flex-direction: column; }
  }
</style>
</head>
<body>

<header>
  <div class="header-inner">
    <h1>Bay Area Kids Events &mdash; <em>Peninsula + South Bay</em></h1>
    <span id="meta">loading&hellip;</span>
  </div>
</header>

<div class="controls">
  <div class="search-wrap">
    <input id="search" type="search" placeholder="Search events&hellip;" autocomplete="off">
  </div>

  <div class="filter-group">
    <span class="filter-label">Region</span>
    <div class="pill-group" id="region-pills"></div>
  </div>

  <div class="filter-group">
    <span class="filter-label">Cost</span>
    <div class="pill-group">
      <button class="pill active" data-cost="all">All</button>
      <button class="pill" data-cost="Free">Free</button>
      <button class="pill" data-cost="Paid">Paid</button>
    </div>
  </div>

  <div class="filter-group">
    <span class="filter-label">From</span>
    <input type="date" id="date-from">
  </div>
  <div class="filter-group">
    <span class="filter-label">To</span>
    <input type="date" id="date-to">
  </div>
</div>

<div class="count-line" id="count-line"></div>

<div id="loading">Fetching events&hellip;</div>
<div id="empty">No events match your filters.<br>Try widening the date range or clearing the search.</div>
<div id="output"></div>

<footer>
  <span>Updated daily 6am PT &middot; <a href="https://github.com/crajagop87/bay-area-kids-events" target="_blank">Source</a></span>
  <span id="footer-count"></span>
</footer>

<script>
// Use local files when served locally, GitHub raw when hosted on Pages
const IS_LOCAL = location.hostname === 'localhost' || location.hostname === '127.0.0.1';
const JSON_URL = IS_LOCAL
  ? '/output/events.json'
  : 'https://raw.githubusercontent.com/crajagop87/bay-area-kids-events/main/output/events.json';
const HEALTH_URL = IS_LOCAL
  ? '/output/health.json'
  : 'https://raw.githubusercontent.com/crajagop87/bay-area-kids-events/main/output/health.json';

let allEvents = [];
let activeRegions = new Set(['all']);
let activeCost = 'all';

// ── Helpers ──────────────────────────────────────────────────────────────────

function fmt_date(iso) {
  if (!iso) return '';
  const d = new Date(iso);
  return d.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric', timeZone: 'America/Los_Angeles' });
}

function fmt_time(iso) {
  if (!iso) return '';
  // Read time directly from the stored ISO string — scraper stores local times
  // tagged as UTC, so we bypass JS timezone conversion entirely
  const m = iso.match(/T(\d{2}):(\d{2})/);
  if (!m) return '';
  const h = parseInt(m[1]), min = m[2];
  if (h === 0 && min === '00') return ''; // skip midnight / no-time entries
  const ampm = h >= 12 ? 'PM' : 'AM';
  const h12 = h % 12 || 12;
  return `${h12}:${min} ${ampm}`;
}

function isoDate(iso) {
  if (!iso) return '';
  return iso.slice(0, 10);
}

function today() {
  return new Date().toISOString().slice(0, 10);
}

function inDays(n) {
  const d = new Date();
  d.setDate(d.getDate() + n);
  return d.toISOString().slice(0, 10);
}

function inferRegion(event) {
  const city = (event.city || event.venue || '').toLowerCase();
  const county = (event.county || '').toLowerCase();
  if (/san francisco|sf|golden gate|mission|soma/.test(city)) return 'SF';
  if (/oakland|berkeley|alameda|fremont|hayward|contra costa|east bay|walnut creek|danville|martinez|livermore/.test(city + county)) return 'East Bay';
  if (/marin|fairfax|san rafael|novato|north bay|vallejo/.test(city + county)) return 'North Bay';
  if (/san jose|campbell|los gatos|saratoga|cupertino|milpitas|morgan hill/.test(city)) return 'South Bay';
  if (/santa cruz|half moon bay|gilroy|scotts valley/.test(city)) return 'Fringe';
  return 'Peninsula'; // default for palo alto, menlo park, mountain view, etc.
}

// ── Load data ────────────────────────────────────────────────────────────────

async function load() {
  try {
    const [evRes, hlRes] = await Promise.all([
      fetch(JSON_URL + '?t=' + Date.now()),
      fetch(HEALTH_URL + '?t=' + Date.now()),
    ]);
    allEvents = await evRes.json();
    const health = await hlRes.json();

    // Stamp region
    allEvents.forEach(e => { e._region = inferRegion(e); });

    // Meta line
    const runAt = health.run_at ? new Date(health.run_at).toLocaleDateString('en-US', {
      weekday: 'short', month: 'short', day: 'numeric', hour: 'numeric', minute: '2-digit', timeZone: 'America/Los_Angeles'
    }) : '';
    document.getElementById('meta').textContent =
      `${health.deduped_events || allEvents.length} events · updated ${runAt} · ${health.channels_ok}/${health.channels_total} sources ok`;
    document.getElementById('footer-count').textContent =
      `${allEvents.length} events in JSON`;

    // Build region pills
    const regions = ['all', 'Peninsula', 'SF', 'East Bay', 'South Bay', 'North Bay', 'Fringe'];
    const pillContainer = document.getElementById('region-pills');
    regions.forEach(r => {
      const b = document.createElement('button');
      b.className = 'pill' + (r === 'all' ? ' active' : '');
      b.dataset.region = r;
      b.textContent = r === 'all' ? 'All' : r;
      b.addEventListener('click', () => toggleRegion(r));
      pillContainer.appendChild(b);
    });

    // Default date range: today → +16 days
    document.getElementById('date-from').value = today();
    document.getElementById('date-to').value = inDays(16);

    document.getElementById('loading').style.display = 'none';
    render();
  } catch (err) {
    document.getElementById('loading').textContent = 'Failed to load events. Try refreshing.';
    console.error(err);
  }
}

// ── Filters ──────────────────────────────────────────────────────────────────

function toggleRegion(r) {
  if (r === 'all') {
    activeRegions = new Set(['all']);
  } else {
    activeRegions.delete('all');
    if (activeRegions.has(r)) activeRegions.delete(r);
    else activeRegions.add(r);
    if (activeRegions.size === 0) activeRegions.add('all');
  }
  document.querySelectorAll('[data-region]').forEach(b => {
    b.classList.toggle('active', activeRegions.has(b.dataset.region));
  });
  render();
}

document.querySelectorAll('[data-cost]').forEach(b => {
  b.addEventListener('click', () => {
    activeCost = b.dataset.cost;
    document.querySelectorAll('[data-cost]').forEach(x => x.classList.remove('active'));
    b.classList.add('active');
    render();
  });
});

document.getElementById('search').addEventListener('input', render);
document.getElementById('date-from').addEventListener('change', render);
document.getElementById('date-to').addEventListener('change', render);

// ── Render ───────────────────────────────────────────────────────────────────

function render() {
  const query = document.getElementById('search').value.toLowerCase().trim();
  const fromDate = document.getElementById('date-from').value;
  const toDate = document.getElementById('date-to').value;

  let events = allEvents.filter(e => {
    const d = isoDate(e.start_datetime);

    // Date range
    if (fromDate && d && d < fromDate) return false;
    if (toDate && d && d > toDate) return false;

    // Region
    if (!activeRegions.has('all') && !activeRegions.has(e._region)) return false;

    // Cost
    if (activeCost !== 'all' && e.cost !== activeCost) return false;

    // Search
    if (query) {
      const haystack = [e.title, e.venue, e.city, e.county, e.age_range, e.category, e.source_name]
        .join(' ').toLowerCase();
      if (!haystack.includes(query)) return false;
    }

    return true;
  });

  // Sort by start_datetime, nulls last
  events.sort((a, b) => {
    if (!a.start_datetime) return 1;
    if (!b.start_datetime) return -1;
    return a.start_datetime.localeCompare(b.start_datetime);
  });

  // Count
  document.getElementById('count-line').innerHTML =
    `Showing <strong>${events.length}</strong> of ${allEvents.length} events`;

  // Empty state
  const empty = document.getElementById('empty');
  const output = document.getElementById('output');
  if (events.length === 0) {
    empty.style.display = 'block';
    output.innerHTML = '';
    return;
  }
  empty.style.display = 'none';

  // Group by date
  const groups = {};
  events.forEach(e => {
    const key = e.start_datetime ? isoDate(e.start_datetime) : 'no-date';
    if (!groups[key]) groups[key] = [];
    groups[key].push(e);
  });

  const html = [];
  Object.entries(groups).forEach(([dateKey, evs]) => {
    const label = dateKey === 'no-date'
      ? 'Date unknown'
      : new Date(dateKey + 'T12:00:00').toLocaleDateString('en-US', {
          weekday: 'long', month: 'long', day: 'numeric'
        });

    html.push(`<div class="date-group"><h2>${label}</h2></div>`);
    html.push(`<div class="grid">`);
    evs.forEach(e => html.push(card(e)));
    html.push(`</div>`);
  });

  output.innerHTML = html.join('');
}

function card(e) {
  const time = fmt_time(e.start_datetime);
  const costClass = e.cost === 'Free' ? 'tag-free' : e.cost === 'Paid' ? 'tag-paid' : 'tag-unknown';
  const costLabel = e.cost === 'Free' ? 'Free' : e.cost === 'Paid'
    ? (e.cost_amount > 1 ? `$${e.cost_amount}` : 'Paid') : '?';
  const isCamp = e.is_camp;

  const titleHtml = e.ticket_url
    ? `<a href="${esc(e.ticket_url)}" target="_blank" rel="noopener">${esc(e.title)} ↗</a>`
    : esc(e.title);

  const venue = e.venue && e.venue !== e.city ? e.venue : (e.city || '');

  // Show a clean domain as the visible link label
  let linkHtml = '';
  if (e.ticket_url) {
    try {
      const domain = new URL(e.ticket_url).hostname.replace(/^www\./, '');
      linkHtml = `<div class="card-link"><a href="${esc(e.ticket_url)}" target="_blank" rel="noopener">${esc(domain)}</a></div>`;
    } catch(_) {
      linkHtml = `<div class="card-link"><a href="${esc(e.ticket_url)}" target="_blank" rel="noopener">View event</a></div>`;
    }
  }

  return `<div class="card">
    <div class="card-title">${titleHtml}</div>
    <div class="card-meta">
      ${time ? `<span>${time}</span>` : ''}
      <span class="tag ${costClass}">${costLabel}</span>
      ${isCamp ? `<span class="tag tag-camp">camp</span>` : ''}
      ${e._region ? `<span>${e._region}</span>` : ''}
      ${e.ticket_status && e.ticket_status !== 'free walk-up'
        ? `<span style="color:var(--accent)">${esc(e.ticket_status)}</span>` : ''}
    </div>
    ${venue ? `<div class="card-venue">${esc(venue)}</div>` : ''}
    ${linkHtml}
    <div class="card-source">${esc(e.source_name || '')}</div>
  </div>`;
}

function esc(s) {
  const d = document.createElement('div');
  d.textContent = String(s);
  return d.innerHTML;
}

load();
</script>
</body>
</html>
